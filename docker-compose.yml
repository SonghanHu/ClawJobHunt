services:
  openclaw-gateway:
    build: .
    image: openclaw-custom:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      GMAIL_API_KEY: ${GMAIL_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN_SECRETARY: ${DISCORD_BOT_TOKEN_SECRETARY:-}
      DISCORD_BOT_TOKEN_LEGISLATURE: ${DISCORD_BOT_TOKEN_LEGISLATURE:-}
      DISCORD_BOT_TOKEN_EXECUTIVE: ${DISCORD_BOT_TOKEN_EXECUTIVE:-}
      DISCORD_BOT_TOKEN_JUDICIARY: ${DISCORD_BOT_TOKEN_JUDICIARY:-}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-openclaw}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ./my_info:/home/node/.openclaw/workspace/my_info:rw
      - ./.gog-auth:/home/node/.config/gogcli
    command:
      - sh
      - -lc
      - openclaw gateway --allow-unconfigured

  task-progress:
    image: node:20-alpine
    container_name: task-progress
    restart: unless-stopped
    ports:
      - "${TASK_PROGRESS_PORT:-3080}:3080"
    environment:
      PORT: 3080
      OPENCLAW_CONFIG_DIR: /data
    volumes:
      - ./task-progress:/app:ro
      - ${OPENCLAW_CONFIG_DIR}:/data:ro
    command: sh -c "cp -r /app /tmp/app && cd /tmp/app && npm install --omit=dev && node server.js"
